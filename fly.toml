app = 'rustlings-api'
primary_region = 'iad'

[build]

[env]
  DATABASE_URL = 'sqlite:/data/rustlings.db'
  UI_DIR = '/app/ui/out'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'rustlings_data'
  destination = '/data'
