app = 'rustlings-web'
primary_region = 'iad'

[build]

[env]
  DATABASE_URL = 'sqlite:/data/rustlings.db'
  API_BASE_URL = 'http://localhost:3000'
  PORT = '8080'
  HOSTNAME = '0.0.0.0'

[[mounts]]
  source = 'rustlings_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
