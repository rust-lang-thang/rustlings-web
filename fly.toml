# fly.toml app configuration file generated for rustlings-api on 2026-07-09T16:46:37+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rustlings-api'
primary_region = 'iad'

[build]
[env]
  DATABASE_URL = 'sqlite:/data/rustlings.db'
  UI_DIR = '/app/ui/out'

[[mounts]]
  source = 'rustlings_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
